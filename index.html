<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatiBot - NoCode Web App Panel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app-container">
        <h2>🛠 CreatiBot Konstruktor</h2>
        <p id="user-info">Yuklanmoqda...</p>

        <hr>

        <div class="section" id="bot-settings">
            <h3>1. Bot Sozlamalari</h3>
            <label>BotFather Bergan Token:</label>
            <input type="text" id="bot-token" placeholder="123456:ABC-DEF...">
            <button onclick="saveBotSettings()">Tokenni Saqlash</button>
        </div>

        <div class="section" id="designer-panel">
            <h3>2. Bot/Web App Dizayni</h3>
            
            <label>Ilova Sarlavhasi (Header):</label>
            <input type="text" id="app-title" placeholder="Mening Onlayn Do'konim">

            <label>Asosiy Rang (Hex):</label>
            <input type="color" id="app-color" value="#3498db">

            <label>Bot uchun Rasm (Banner):</label>
            <input type="file" id="app-image" accept="image/*">
            <small id="upload-status"></small>

            <label>Tugma Matni:</label>
            <input type="text" id="btn-text" placeholder="🛍 Buyurtma berish">

            <button onclick="saveDesign()" class="success-btn">Dizaynni Saqlash va URL olish</button>
        </div>

        <div class="section hidden" id="url-output">
            <h3>🎉 Bot Web App Tayyor!</h3>
            <p>Quyidagi URL manzilini nusxalang va BotFather'dagi botingizga (New Web App) joylashtiring:</p>
            <input type="text" id="generated-url" readonly onclick="this.select()">
        </div>

        <div class="section hidden" id="billing-section">
            <h3 style="color: red;">⚠️ Obuna muddati tugagan</h3>
            <p>Botni faollashtirish uchun 15$ to'lov qiling.</p>
            <button onclick="redirectToPayme()" class="pay-btn">Payme orqali to'lash</button>
            <button onclick="redirectToClick()" class="pay-btn">Click orqali to'lash</button>
        </div>
    </div>

    <script src="billing.js"></script>
    <script src="app.js"></script>
</body>
</html>
