<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotForge - Bot Yaratish</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 20px; text-align: center; }
        .bot-type {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .bot-type:hover { transform: scale(1.02); }
        .bot-type h3 { margin-bottom: 8px; }
        .bot-type p { font-size: 14px; opacity: 0.7; }
        button {
            width: 100%;
            padding: 15px;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 BotForge Studio</h1>
        
        <div class="bot-type" onclick="selectType('simple_button')">
            <h3>📝 Oddiy tugmali bot</h3>
            <p>Tugmalar bilan ishlaydigan oddiy bot</p>
        </div>
        
        <div class="bot-type" onclick="selectType('message_bot')">
            <h3>💬 Xabar yuboruvchi bot</h3>
            <p>Avtomatik javob beradigan bot</p>
        </div>
        
        <div class="bot-type" onclick="selectType('webapp_bot')">
            <h3>🌐 Web App bot</h3>
            <p>Veb-ilova bilan ishlaydigan bot</p>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        function selectType(type) {
            tg.sendData(JSON.stringify({
                action: 'select_type',
                bot_type: type
            }));
            tg.close();
        }
    </script>
</body>
</html>
