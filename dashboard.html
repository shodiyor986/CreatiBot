<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotForge - Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .stat-number { font-size: 32px; font-weight: bold; }
        .stat-label { font-size: 14px; opacity: 0.7; margin-top: 5px; }
        .menu-item {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .menu-icon { font-size: 24px; }
        .menu-text { flex: 1; }
        .menu-title { font-weight: bold; margin-bottom: 4px; }
        .menu-desc { font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Dashboard</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="botCount">0</div>
                <div class="stat-label">Mening botlarim</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="premiumStatus">❌</div>
                <div class="stat-label">Premium status</div>
            </div>
        </div>
        
        <div class="menu-item" onclick="action('newbot')">
            <div class="menu-icon">➕</div>
            <div class="menu-text">
                <div class="menu-title">Yangi bot yaratish</div>
                <div class="menu-desc">Scratch bloklar orqali bot yarating</div>
            </div>
        </div>
        
        <div class="menu-item" onclick="action('mybots')">
            <div class="menu-icon">🤖</div>
            <div class="menu-text">
                <div class="menu-title">Mening botlarim</div>
                <div class="menu-desc">Botlaringizni boshqaring</div>
            </div>
        </div>
        
        <div class="menu-item" onclick="action('channels')">
            <div class="menu-icon">📢</div>
            <div class="menu-text">
                <div class="menu-title">Kanal va guruhlar</div>
                <div class="menu-desc">Kanallaringizni boshqaring</div>
            </div>
        </div>
        
        <div class="menu-item" onclick="action('subscribe')">
            <div class="menu-icon">🌟</div>
            <div class="menu-text">
                <div class="menu-title">Premium obuna</div>
                <div class="menu-desc">Ko'proq imkoniyatlarga ega bo'ling</div>
            </div>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Ma'lumotlarni yuklash
        fetch('/api/user_stats')
            .then(res => res.json())
            .then(data => {
                document.getElementById('botCount').innerText = data.bot_count || 0;
                document.getElementById('premiumStatus').innerHTML = data.is_premium ? '✅' : '❌';
            });
        
        function action(action_name) {
            tg.sendData(JSON.stringify({
                action: action_name
            }));
            tg.close();
        }
    </script>
</body>
</html>
